name: biblioteca-juegos

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: biblioteca
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pbiblioteca"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    ports:
      - "8761:8761"
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
    restart: unless-stopped

  ms-categoria:
    build:
      context: https://github.com/bliblioteca-de-juegos/Ms_Categoria.git#main
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/categorias_Juegos_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: biblioteca
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      MS_JUEGOS_URL: ${PUBLIC_GATEWAY_URL:-http://localhost:8080}
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    restart: unless-stopped

  ms-juegos:
    build:
      context: https://github.com/bliblioteca-de-juegos/ms-Juegos.git#main
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/juegos_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: biblioteca
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      MS_CATEGORIA_URL: ${PUBLIC_GATEWAY_URL:-http://localhost:8080}
      MS_CLASIFICACION_URL: ${PUBLIC_GATEWAY_URL:-http://localhost:8080}
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    restart: unless-stopped

  ms-usuario:
