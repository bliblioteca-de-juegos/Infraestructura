spring.application.name=api-gateway
server.port=8080

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.server.webflux.discovery.locator.enabled=false

spring.cloud.gateway.server.webflux.routes[0].id=ms-carrito
spring.cloud.gateway.server.webflux.routes[0].uri=lb://ms-carrito
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v2/carrito/**

spring.cloud.gateway.server.webflux.routes[1].id=ms-horas-jugadas
spring.cloud.gateway.server.webflux.routes[1].uri=lb://ms-horas-jugadas
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v2/horas-jugadas/**

